<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entity Breakdown Dashboard</title>
    
    <!-- React & ReactDOM (Version 17 is highly stable for CDN usage) -->
    <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    
    <!-- Babel to translate JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Recharts (Pinned to 1.8.5 - The most stable standalone UMD version) -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@1.8.5/umd/Recharts.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = window.React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine } = window.Recharts;

        // --- DATA SOURCE: ENTITY BREAKDOWNS ---
        const orgData = [
          { name: 'PRD:OXT:OXT - OXO Int.', initialWmape: 59.25, postWmape: 52.96, initialBias: -6.91, postBias: 6.56 },
          { name: 'PRD:KMS:KMS - Kaz USA', initialWmape: 64.60, postWmape: 51.64, initialBias: 21.74, postBias: 24.94 },
          { name: 'PRD:KTN:KTN - Kaz Switz.', initialWmape: 48.44, postWmape: 46.56, initialBias: 17.51, postBias: 18.15 },
          { name: 'PRD:HOB:Helen of Troy DC', initialWmape: 36.48, postWmape: 36.75, initialBias: -1.75, postBias: 9.30 },
          { name: 'PRD:HFT:HFT-Hydro Flask', initialWmape: 71.01, postWmape: 75.93, initialBias: 17.17, postBias: 13.61 },
          { name: 'PRD:JUK:HOT (UK) Ltd', initialWmape: 60.87, postWmape: 57.74, initialBias: 37.70, postBias: 40.22 },
          { name: 'PRD:COB:COB - Curlsmith', initialWmape: 69.49, postWmape: 64.87, initialBias: 15.54, postBias: 18.90 },
          { name: 'PRD:JHM:JHM - Jiaxing', initialWmape: 108.33, postWmape: 102.32, initialBias: -55.56, postBias: -46.55 },
          { name: 'PRD:DOB:DOB - Drybar USA', initialWmape: 66.43, postWmape: 58.45, initialBias: -16.39, postBias: -9.86 },
          { name: 'PRD:KCN:KCN - Kaz Metro CA', initialWmape: 53.13, postWmape: 46.25, initialBias: -22.59, postBias: -16.67 },
          { name: 'PRD:OOB:OOB - Osprey', initialWmape: 72.03, postWmape: 78.63, initialBias: -13.62, postBias: -15.78 },
          { name: 'PRD:HMZ:HMZ - HOT Mexico', initialWmape: 48.24, postWmape: 48.04, initialBias: 23.90, postBias: 30.13 },
          { name: 'PRD:OKT:OKT - Osprey KTN', initialWmape: 117.95, postWmape: 113.32, initialBias: -87.01, postBias: -77.82 },
          { name: 'PRD:HFC:Hydro Flask Metro CA', initialWmape: 100.58, postWmape: 99.29, initialBias: -50.35, postBias: -52.68 },
          { name: 'PRD:HCN:Helen of Troy (CA)', initialWmape: 42.10, postWmape: 33.15, initialBias: 5.30, postBias: 6.68 },
          { name: 'PRD:OGB:Osprey Great Bear', initialWmape: 72.75, postWmape: 69.96, initialBias: 5.53, postBias: 8.02 },
          { name: 'PRD:KEC:KEC - Kaz Switz.', initialWmape: 28.92, postWmape: 34.14, initialBias: -0.84, postBias: -5.77 },
          { name: 'PRD:CMC:Curlsmith Metro CA', initialWmape: 99.70, postWmape: 99.58, initialBias: 98.28, postBias: 98.37 },
          { name: 'PRD:OMC:Osprey Metro CA', initialWmape: 107.30, postWmape: 102.19, initialBias: -44.46, postBias: -27.73 },
        ];

        const customerData = [
          { name: 'OXO TARGET', initialWmape: 55.99, postWmape: 55.99, initialBias: 19.02, postBias: 29.81 },
          { name: 'OXO WALMART', initialWmape: 51.57, postWmape: 51.57, initialBias: -54.58, postBias: -31.79 },
          { name: 'OXO AMAZON', initialWmape: 65.96, postWmape: 65.96, initialBias: -11.00, postBias: 2.62 },
          { name: 'OXO ALL OTHER', initialWmape: 46.66, postWmape: 46.66, initialBias: -6.56, postBias: 6.40 },
          { name: 'AMAZON.COM (HC)', initialWmape: 62.75, postWmape: 66.47, initialBias: 32.73, postBias: 38.80 },
          { name: 'AMAZON EMEA', initialWmape: 67.23, postWmape: 63.29, initialBias: 37.34, postBias: 39.49 },
          { name: 'BEAUTY US WALMART', initialWmape: 51.27, postWmape: 28.04, initialBias: -73.34, postBias: 24.10 },
          { name: 'HF AMAZON', initialWmape: 87.87, postWmape: 90.66, initialBias: 52.18, postBias: 38.86 },
          { name: 'WAL-MART STORES ALL (US)', initialWmape: 44.23, postWmape: 44.23, initialBias: 60.12, postBias: 14.04 },
          { name: 'WALGREENS', initialWmape: 44.21, postWmape: 44.21, initialBias: -10.90, postBias: 38.98 },
          { name: 'TARGET STORES ALL (US)', initialWmape: 60.31, postWmape: 60.31, initialBias: 30.41, postBias: 33.42 },
          { name: 'Beauty US Target', initialWmape: 62.97, postWmape: 24.10, initialBias: 46.94, postBias: 7.54 },
          { name: 'CS ULTA US', initialWmape: 92.08, postWmape: 78.76, initialBias: 3.32, postBias: 5.49 },
          { name: 'GERMANY ALL OTHER', initialWmape: 31.46, postWmape: 41.84, initialBias: -11.95, postBias: -20.73 },
          { name: 'BEAUTY US AMAZON', initialWmape: 89.47, postWmape: 79.14, initialBias: -8.12, postBias: 0.35 },
          { name: 'OXO KROGER', initialWmape: 66.73, postWmape: 66.73, initialBias: 27.55, postBias: 18.46 },
          { name: 'HF ALL OTHER', initialWmape: 100.50, postWmape: 109.34, initialBias: -43.21, postBias: -28.05 },
          { name: 'CVS MERIDIAN', initialWmape: 54.34, postWmape: 47.70, initialBias: 18.68, postBias: 19.09 },
          { name: 'HF DTC', initialWmape: 68.23, postWmape: 61.96, initialBias: 6.79, postBias: 4.97 },
          { name: 'HF ALL APAC', initialWmape: 117.99, postWmape: 112.65, initialBias: -124.54, postBias: -115.75 },
        ];

        const lobData = [
          { name: 'HO US LOB', initialWmape: 61.12, postWmape: 56.66, initialBias: -3.63, postBias: 7.17 },
          { name: 'US LOB', initialWmape: 64.65, postWmape: 51.67, initialBias: 21.78, postBias: 24.97 },
          { name: 'EMEA LOB', initialWmape: 51.67, postWmape: 48.57, initialBias: 19.92, postBias: 22.22 },
          { name: 'BEAUTY US', initialWmape: 47.61, postWmape: 45.78, initialBias: 0.24, postBias: 8.95 },
          { name: 'HO APAC LOB', initialWmape: 107.00, postWmape: 103.42, initialBias: -49.54, postBias: -44.26 },
          { name: 'CA LOB', initialWmape: 53.13, postWmape: 46.25, initialBias: -22.59, postBias: -16.67 },
          { name: 'Default Line of Business', initialWmape: 39.26, postWmape: 40.36, initialBias: 19.15, postBias: 28.26 },
          { name: 'HO CA LOB', initialWmape: 100.39, postWmape: 98.36, initialBias: -48.57, postBias: -48.17 },
          { name: 'BEAUTY CA', initialWmape: 65.68, postWmape: 58.42, initialBias: 33.67, postBias: 35.96 },
          { name: 'LA LOB', initialWmape: 72.06, postWmape: 67.49, initialBias: 32.91, postBias: 33.58 },
          { name: 'HO LA LOB', initialWmape: 91.92, postWmape: 110.58, initialBias: -220.53, postBias: -275.38 },
        ];

        function App() {
          const [breakdownCategory, setBreakdownCategory] = useState('lob'); 
          const [breakdownMetric, setBreakdownMetric] = useState('wmape'); 

          const getActiveBreakdownData = () => {
            let data = [];
            if (breakdownCategory === 'lob') data = lobData;
            if (breakdownCategory === 'customer') data = customerData;
            if (breakdownCategory === 'org') data = orgData;

            return [...data].sort((a, b) => {
                if (breakdownMetric === 'wmape') {
                   const improvementA = a.initialWmape - a.postWmape;
                   const improvementB = b.initialWmape - b.postWmape;
                   return improvementB - improvementA; 
                } else {
                   const improvementA = Math.abs(a.initialBias) - Math.abs(a.postBias);
                   const improvementB = Math.abs(b.initialBias) - Math.abs(b.postBias);
                   return improvementB - improvementA;
                }
            });
          };

          return (
            <div className="min-h-screen bg-white p-4 md:p-8 font-sans flex flex-col">
              <div className="w-full max-w-7xl mx-auto flex-grow flex flex-col space-y-4">
                
                <div className="flex flex-col md:flex-row md:items-end justify-between pb-4 border-b border-slate-100">
                  <div>
                    <h1 className="text-2xl md:text-3xl font-bold text-slate-800">Entity Breakdown: Accuracy Changes</h1>
                    <p className="text-slate-500 text-sm mt-1">Comparing Pre vs Post Tuning (Sorted by biggest improvement)</p>
                  </div>
                  
                  <div className="flex flex-col sm:flex-row gap-3 mt-4 md:mt-0">
                    <select 
                      className="bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2.5 font-medium shadow-sm cursor-pointer"
                      value={breakdownCategory}
                      onChange={(e) => setBreakdownCategory(e.target.value)}
                    >
                      <option value="lob">Line Of Business</option>
                      <option value="customer">HOT Customer Group</option>
                      <option value="org">Organization</option>
                    </select>

                    <select 
                      className="bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2.5 font-medium shadow-sm cursor-pointer"
                      value={breakdownMetric}
                      onChange={(e) => setBreakdownMetric(e.target.value)}
                    >
                      <option value="wmape">WMAPE (%)</option>
                      <option value="bias">Bias (%)</option>
                    </select>
                  </div>
                </div>

                <div className="flex-grow min-h-[500px] w-full pt-4" style={{ height: '70vh' }}>
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart 
                      data={getActiveBreakdownData()} 
                      layout="vertical"
                      margin={{ top: 5, right: 30, left: 180, bottom: 5 }}
                      barGap={0}
                      barSize={16}
                    >
                      <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} stroke="#f1f5f9" />
                      <XAxis 
                        type="number" 
                        tickFormatter={(v) => `${v}%`} 
                        tick={{ fill: '#64748b', fontSize: 12 }} 
                        axisLine={{ stroke: '#cbd5e1' }}
                      />
                      <YAxis 
                        type="category" 
                        dataKey="name" 
                        tick={{ fill: '#334155', fontSize: 12, fontWeight: 500 }} 
                        width={170}
                        axisLine={{ stroke: '#cbd5e1' }}
                        tickLine={false}
                      />
                      <Tooltip 
                        contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontWeight: 500 }}
                        formatter={(value, name) => [`${value}%`, name === (breakdownMetric === 'wmape' ? 'initialWmape' : 'initialBias') ? 'Initial' : 'Post Tuning']}
                      />
                      <Legend 
                        verticalAlign="top" 
                        height={36}
                        formatter={(value) => <span className="text-slate-700 font-medium ml-1">{value === (breakdownMetric === 'wmape' ? 'initialWmape' : 'initialBias') ? 'Initial' : 'Post Tuning'}</span>}
                      />
                      
                      {/* Fixed Conditional Rendering Logic */}
                      {breakdownMetric === 'wmape' && <Bar dataKey="initialWmape" name="initialWmape" fill="#94a3b8" radius={[0, 4, 4, 0]} />}
                      {breakdownMetric === 'wmape' && <Bar dataKey="postWmape" name="postWmape" fill="#4f46e5" radius={[0, 4, 4, 0]} />}

                      {breakdownMetric !== 'wmape' && <ReferenceLine x={0} stroke="#94a3b8" />}
                      {breakdownMetric !== 'wmape' && <Bar dataKey="initialBias" name="initialBias" fill="#94a3b8" radius={[0, 4, 4, 0]} />}
                      {breakdownMetric !== 'wmape' && <Bar dataKey="postBias" name="postBias" fill="#10b981" radius={[0, 4, 4, 0]} />}
                      
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                
              </div>
            </div>
          );
        }

        // Updated for React 17
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
